<!DOCTYPE html>
<html lang="en">
<head>

<body>
    <div class="container">
        <!-- Hero Section -->
        <section class="hero">

                <h1 id="profileName">Emmanuel Jongwo Sancho</h1>
                <p class="tagline" id="profileTitle">Finance Professional</p>
                <p class="about" id="profileAbout">Loading...</p>
                <div class="hero-buttons">
                    <a href="mailto:sanchoemmanuelj@gmail.com" class="btn btn-primary">Get in Touch</a>
                    <a id="cvDownload" href="#" class="btn btn-secondary">Download CV</a>
                </div>
            </div>
        </section>

        <!-- Highlights Section -->
        <section class="highlights">

            <div class="highlights-grid" id="highlightsContainer">

            </div>
        </section>

        <!-- Skills Section -->
        <section class="skills">

            <div class="skills-grid" id="skillsContainer">

        <!-- Experience Section -->
        <section class="experience">

            <div class="timeline" id="experienceContainer">
                <!-- Populated by script.js -->
            </div>
        </section>

        <!-- Education Section -->
        <section class="education">
            <h2>Education & Certifications</h2>
            <div class="education-container">
                <div id="educationContainer">
                    <!-- Populated by script.js -->
                </div>
                <div id="certificationsContainer">
                    <!-- Populated by script.js -->
                </div>
            </div>

        <!-- Contact Section -->
        <section class="contact">
            <h2>Let's Connect</h2>
            <p id="contactMessage">Loading...</p>
            <div class="contact-links">
                <a id="emailLink" href="mailto:sanchoemmanuelj@gmail.com" class="contact-link">Email</a>
                <a id="linkedinLink" href="#" target="_blank" class="contact-link">LinkedIn</a>
                <a id="githubLink" href="#" target="_blank" class="contact-link">GitHub</a>
